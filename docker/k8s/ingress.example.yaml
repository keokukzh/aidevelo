apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aidevelo
  namespace: aidevelo
spec:
  ingressClassName: nginx
  rules:
    - host: aidevelo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aidevelo
                port:
                  number: 80
