apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aidevelo-postgres
  namespace: aidevelo
spec:
  serviceName: aidevelo-postgres
  replicas: 1
  selector:
    matchLabels:
      app: aidevelo-postgres
  template:
    metadata:
      labels:
        app: aidevelo-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: aidevelo-postgres-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
