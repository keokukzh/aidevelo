# Aidevelo Workflow Add Background Worker Feature

## Action

Follow the add-background-worker-feature workflow:
1. Write implementation plan and design spec in docs.
2. Add new Drizzle schema file and update schema index.
3. Create new SQL migration for the table.
4. Implement job queue service and register in services index.
5. Create worker entrypoint and handler files.
6. Add/modify API endpoints and update app entry.
7. Integrate worker with relevant routes.
8. Update deployment configuration (e.g., render.yaml).
9. Document usage and patterns in project docs.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: docs/superpowers/plans/*.md, docs/superpowers/specs/*.md, packages/db/src/schema/*.ts

